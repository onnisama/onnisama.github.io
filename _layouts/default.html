<!DOCTYPE html>
<html lang="{% if page.lang %}{{ page.lang }}{% else %}zh-CN{% endif %}">
{% include head.html %}

<body>
    <a class="skip-link" href="#main-content">跳到正文</a>
    <div class="site-shell">
        {% include nav.html %}

        <div class="site-stage">
            {% include search.html %}
            <main id="main-content" tabindex="-1">
                <div id="pjax-root">
                    {{ content }}
                </div>
            </main>
            {% include footer.html %}
        </div>
    </div>

    <div class="fab-container" aria-label="页面工具">
      <button class="fab-btn" type="button" data-theme-toggle aria-label="切换深色模式">
        <svg class="fab-icon fab-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="fab-icon fab-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="fab-btn" type="button" data-scroll-top aria-label="回到顶部">
        <svg class="fab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m18 15-6-6-6 6"/></svg>
      </button>
    </div>
    <script src="{{ '/js/quiet-blog.js' | prepend: site.baseurl }}" defer></script>
</body>
</html>
