<div class="search-dialog" data-search-dialog hidden>
    <button class="search-dialog__backdrop" type="button" data-search-close aria-label="关闭搜索"></button>
    <section class="search-dialog__panel" role="dialog" aria-modal="true" aria-labelledby="search-title">
        <div class="search-dialog__head">
            <div>
                <p>在博客里找一找</p>
                <h2 id="search-title">搜索文章</h2>
            </div>
            <button type="button" data-search-close aria-label="关闭搜索">×</button>
        </div>
        <label class="search-field">
            <span class="sr-only">输入关键词</span>
            <input type="search" id="search-input" placeholder="标题、标签或正文关键词" autocomplete="off">
        </label>
        <div id="search-results" class="search-results" aria-live="polite">
            <p class="search-hint">试试“Git”“Python”或“学习笔记”。</p>
        </div>
    </section>
</div>
