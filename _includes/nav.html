<aside class="site-rail" aria-label="站点导航">
    <div class="rail-topbar">
        <a class="rail-brand" href="{{ site.baseurl }}/" aria-label="{{ site.title }}首页">
            <span class="rail-brand__mark" aria-hidden="true">雾</span>
            <span>{{ site.title }}</span>
        </a>
        <div class="rail-topbar__actions">
            <button class="rail-search" type="button" data-search-open aria-label="打开搜索">
                <span aria-hidden="true">⌕</span>
            </button>
            <button class="rail-menu" type="button" aria-expanded="false" aria-controls="site-links">
                <span></span><span></span><span></span>
                <span class="sr-only">展开导航</span>
            </button>
        </div>
    </div>

    <div class="rail-panel" id="site-links">
        <a class="rail-profile" href="{{ '/about/' | prepend: site.baseurl }}">
            <img src="{{ site.sidebar-avatar }}" alt="雾汐的头像" width="88" height="88">
            <span class="rail-profile__name">雾汐</span>
            <span class="rail-profile__note">{{ site.sidebar-about-description }}</span>
        </a>

        <nav class="rail-links" aria-label="主要导航">
            <a href="{{ site.baseurl }}/" {% if page.url == '/' %}aria-current="page"{% endif %}><span>首页</span><small>最近更新</small></a>
            <a href="{{ '/archive/' | prepend: site.baseurl }}" {% if page.url contains '/archive' %}aria-current="page"{% endif %}><span>归档</span><small>{{ site.posts | size }} 篇</small></a>
            <a href="{{ '/about/' | prepend: site.baseurl }}" {% if page.url contains '/about' %}aria-current="page"{% endif %}><span>关于</span><small>认识我</small></a>
            <button type="button" data-search-open><span>搜索</span><small>查找文章</small></button>
        </nav>

        {% if site.github_username %}
        <a class="rail-github" href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener noreferrer">
            GitHub <span aria-hidden="true">↗</span>
        </a>
        {% endif %}
    </div>
</aside>
